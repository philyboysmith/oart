title: News
tabs:
  main:
    display: Main
    sections:
      -
        display: Content
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: Title
              validate:
                - required
          -
            handle: featured_image
            field:
              type: assets
              container: assets
              max_files: 1
              display: 'Featured Image'
              mode: list
          -
            handle: excerpt
            field:
              type: textarea
              display: Excerpt
              character_limit: 200
          -
            handle: content
            field:
              type: bard
              display: Content
              buttons:
                - h2
                - h3
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - removeformat
                - quote
                - anchor
                - image
              container: assets
              save_html: false
  sidebar:
    display: Sidebar
    sections:
      -
        display: Meta
        fields:
          -
            handle: slug
            field:
              type: slug
              from: title
              display: Slug
          -
            handle: date
            field:
              type: date
              display: Date
              required: true
              time_enabled: false
